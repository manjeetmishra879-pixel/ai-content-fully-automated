version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-content-postgres
    environment:
      POSTGRES_DB: content_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/database.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - content_network

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: ai-content-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - content_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ai-content-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - content_network

  # Chroma Vector Database
  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: ai-content-chroma
    environment:
      IS_PERSISTENT: "TRUE"
    volumes:
      - chroma_data:/chroma/chroma_data
    ports:
      - "8000:8000"
    networks:
      - content_network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: ai-content-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CHROMA_HOST: chroma
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./app:/app/app
      - ./worker:/app/worker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - content_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ai-content-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./app:/app/app
      - ./worker:/app/worker
    depends_on:
      - postgres
      - redis
    networks:
      - content_network
    command: celery -A worker worker --loglevel=info --concurrency=4

  # Celery Beat Scheduler
  beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ai-content-beat
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/content_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./worker:/app/worker
    depends_on:
      - postgres
      - redis
    networks:
      - content_network
    command: celery -A worker beat --loglevel=info

  # Ollama LLM Service (optional, for local deployment)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ai-content-ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   networks:
  #     - content_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-content-nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - content_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-content-prometheus
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - content_network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: ai-content-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - content_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  chroma_data:
  prometheus_data:
  grafana_data:
  # ollama_data:

networks:
  content_network:
    driver: bridge
